name: Build

on:
  push:
    branches: [ "**" ]
    tags: [ "v*" ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.10.2"

      - name: Build all targets
        run: gradle assembleAll --no-daemon --stacktrace

      - name: Read version
        id: ver
        run: echo "version=$(grep '^modVersion=' gradle.properties | cut -d= -f2)" >> "$GITHUB_OUTPUT"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ars-mekanica-${{ steps.ver.outputs.version }}
          path: |
            build/libs/*.jar
            build/libs/*.zip

      - name: Publish release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: Ars Mekanica ${{ steps.ver.outputs.version }}
          make_latest: true
          files: |
            build/libs/*.jar
            build/libs/*.zip
