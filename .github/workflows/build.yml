name: Build

on:
  push:
    branches: [ "**" ]
    tags: [ "v*" ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  neoforge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.10.2"
      - name: Build
        working-directory: neoforge-1.21.1
        run: gradle build --no-daemon --stacktrace
      - uses: actions/upload-artifact@v4
        with:
          name: neoforge-jar
          path: |
            neoforge-1.21.1/build/libs/*.jar
            !neoforge-1.21.1/build/libs/*-sources.jar

  forge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.8"
      - name: Build
        working-directory: forge-1.20.1
        run: gradle build --no-daemon --stacktrace
      - uses: actions/upload-artifact@v4
        with:
          name: forge-jar
          path: |
            forge-1.20.1/build/libs/*.jar
            !forge-1.20.1/build/libs/*-sources.jar

  datapacks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - id: ver
        run: echo "version=$(grep '^modVersion=' neoforge-1.21.1/gradle.properties | cut -d= -f2)" >> "$GITHUB_OUTPUT"
      - name: Zip datapacks
        run: |
          mkdir -p out
          (cd datapack/ars-mekanica-datapack-1.21.1 && zip -r "../../out/ars-mekanica-datapack-${{ steps.ver.outputs.version }}-1.21.1.zip" .)
          (cd datapack/ars-mekanica-datapack-1.20.1 && zip -r "../../out/ars-mekanica-datapack-${{ steps.ver.outputs.version }}-1.20.1.zip" .)
      - uses: actions/upload-artifact@v4
        with:
          name: datapacks
          path: out/*.zip

  release:
    needs: [ neoforge, forge, datapacks ]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
      - uses: softprops/action-gh-release@v2
        with:
          name: Ars Mekanica ${{ github.ref_name }}
          prerelease: ${{ contains(github.ref_name, 'beta') }}
          make_latest: ${{ !contains(github.ref_name, 'beta') }}
          files: |
            dist/**/*.jar
